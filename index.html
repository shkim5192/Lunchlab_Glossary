<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ffffff">
<title>런치랩 용어집</title>
<link rel="manifest" href="manifest.json?v=2">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" href="favicon-32x32.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green:      #1B4D3E;
    --green-mid:  #2A6B57;
    --green-light:#E8F2EF;
    --gold:       #C9A227;
    --gold-light: #FDF6E3;
    --gold-dark:  #A07A10;
    --bg:         #F8F8F6;
    --surface:    #FFFFFF;
    --border:     #E4E2DC;
    --border2:    #CCC9BF;
    --text:       #1A1A18;
    --muted:      #6B6960;
    --muted2:     #9B9890;
    --radius:     10px;
    --font:       'Noto Sans KR', sans-serif;
    --mono:       'DM Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  /* ── Header ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }
  .header-inner {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 20px;
    height: 64px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    text-decoration: none;
  }
  .logo-mark {
    width: 28px;
    height: 28px;
    background: var(--green);
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-mark span {
    color: var(--gold);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    line-height: 1;
  }
  .logo-text {
    font-size: 14px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: -.01em;
  }
  .logo-sub {
    font-size: 12px;
    color: var(--muted2);
    margin-left: 2px;
  }

  /* Search */
  .search-wrap { flex: 1; position: relative; }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 15px;
    height: 15px;
    stroke: var(--muted2);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    pointer-events: none;
  }
  #search {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px 9px 36px;
    font-family: var(--font);
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  #search::placeholder { color: var(--muted2); }
  #search:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(27,77,62,.08);
  }

  /* Refresh btn */
  .btn-refresh {
    background: var(--green);
    border: none;
    border-radius: 8px;
    color: #fff;
    padding: 8px 14px;
    cursor: pointer;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    transition: background .2s, opacity .2s;
    flex-shrink: 0;
  }
  .btn-refresh:hover { background: var(--green-mid); }
  .btn-refresh:disabled { opacity: .6; cursor: default; }
  .btn-refresh svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }
  .spin { animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Layout ── */
  .layout {
    max-width: 960px;
    margin: 0 auto;
    padding: 28px 24px 80px;
    display: grid;
    grid-template-columns: 168px 1fr;
    gap: 32px;
    align-items: start;
  }

  /* ── Sidebar ── */
  .sidebar { position: sticky; top: 88px; }
  .sidebar-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted2);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 8px;
    padding-left: 10px;
  }
  .cat-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }
  .cat-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 400;
    color: var(--muted);
    transition: background .15s, color .15s;
  }
  .cat-item:hover { background: var(--green-light); color: var(--green); }
  .cat-item.active {
    background: var(--green);
    color: #fff;
    font-weight: 500;
  }
  .cat-item .count {
    font-family: var(--mono);
    font-size: 11px;
    background: rgba(0,0,0,.06);
    border-radius: 4px;
    padding: 1px 6px;
    color: inherit;
    opacity: .7;
  }
  .cat-item.active .count { background: rgba(255,255,255,.2); opacity: 1; }

  /* ── Content ── */
  .content-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .content-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
  }
  .content-meta {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted2);
  }

  /* Term cards */
  .term-list { display: flex; flex-direction: column; gap: 6px; }

  .term-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color .2s, box-shadow .2s;
  }
  .term-card:hover {
    border-color: var(--border2);
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .term-card.open {
    border-color: var(--green);
    box-shadow: 0 2px 12px rgba(27,77,62,.08);
  }

  .term-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 15px 18px;
    cursor: pointer;
    user-select: none;
  }
  .term-ko {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }
  .term-en {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted2);
    white-space: nowrap;
  }
  .term-chevron {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    stroke: var(--muted2);
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    transition: transform .2s, stroke .2s;
  }
  .term-card.open .term-chevron { transform: rotate(180deg); stroke: var(--green); }

  .term-body {
    display: none;
    padding: 0 18px 18px;
    border-top: 1px solid var(--border);
    padding-top: 14px;
  }
  .term-card.open .term-body { display: block; }

  .term-def {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.85;
    margin-bottom: 12px;
  }
  .term-ex {
    background: var(--gold-light);
    border-left: 3px solid var(--gold);
    border-radius: 0 8px 8px 0;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
  }
  .term-ex-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--gold-dark);
    letter-spacing: .06em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 4px;
  }

  /* Empty / loading */
  .state-box {
    padding: 64px 20px;
    text-align: center;
    color: var(--muted2);
    font-size: 14px;
  }
  .state-box .icon { font-size: 32px; margin-bottom: 12px; display: block; opacity: .4; }

  /* Error banner */
  .error-banner {
    background: #FEF2F2;
    border: 1px solid #FECACA;
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 13px;
    color: #B91C1C;
    margin-bottom: 16px;
    display: none;
  }
  .error-banner.show { display: block; }

  /* Highlight */
  mark {
    background: rgba(201,162,39,.18);
    color: var(--gold-dark);
    border-radius: 2px;
    padding: 0 2px;
  }

  /* ── Mobile ── */
  @media (max-width: 620px) {
    .layout { grid-template-columns: 1fr; gap: 0; padding: 16px 16px 80px; }
    .sidebar { position: static; }
    .cat-list { flex-direction: row; flex-wrap: wrap; margin-bottom: 20px; }
    .logo-sub { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="#">
      <div class="logo-mark"><span>L</span></div>
      <span class="logo-text">런치랩</span>
      <span class="logo-sub">용어집</span>
    </a>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="용어 또는 설명 검색..." autocomplete="off">
    </div>
    <button class="btn-refresh" id="btn-refresh" title="새로고침">
      <svg id="refresh-icon" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      <span id="refresh-label">새로고침</span>
    </button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <p class="sidebar-label">카테고리</p>
    <ul class="cat-list" id="cat-list">
      <li class="cat-item active" data-cat="전체">
        전체 <span class="count" id="count-all">0</span>
      </li>
    </ul>
  </aside>

  <main>
    <div class="error-banner" id="error-banner"></div>
    <div class="content-header">
      <span class="content-title" id="content-title">전체 용어</span>
      <span class="content-meta" id="content-meta"></span>
    </div>
    <div class="term-list" id="term-list">
      <div class="state-box">
        <span class="icon">⏳</span>
        데이터를 불러오는 중입니다…
      </div>
    </div>
  </main>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 스프레드시트 ID
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const SHEET_ID = '1Ut-I8yUmPABUV-UdEO4Z3KN7kIT41c6W0Qv42SZa0AA';
// 카테고리는 '_categories' 시트 탭에서 자동으로 읽어옵니다.
// 배포 없이 Sheets에서 바로 추가/삭제 가능!
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const CATEGORY_GID = '0';

const csvUrl = (sheet, gid) =>
  gid
    ? `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}&t=${Date.now()}`
    : `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=${encodeURIComponent(sheet)}&t=${Date.now()}`;

let allTerms = [];
let activeCat = '전체';
let query = '';

// ── CSV 파싱 ──────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  return lines.slice(1).map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (c === ',' && !inQ) {
        cols.push(cur.trim()); cur = '';
      } else cur += c;
    }
    cols.push(cur.trim());
    return cols;
  }).filter(cols => cols[0]);
}

// ── 1단계: _categories 시트에서 카테고리 목록 읽기 ────────────
async function fetchCategories() {
  const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${CATEGORY_GID}&t=${Date.now()}`);
  if (!res.ok) throw new Error(`_categories 시트를 불러오지 못했습니다 (${res.status})`);
  const text = await res.text();
  const rows = parseCSV(text);
  return rows.map(cols => ({ name: cols[0], gid: cols[1] || '' })).filter(r => r.name);
}

// ── 2단계: 카테고리별 용어 데이터 병렬 로드 ──────────────────
async function loadAll() {
  setRefreshing(true);
  hideError();
  allTerms = [];

  let categories;
  try {
    categories = await fetchCategories();
    if (!categories.length) throw new Error('카테고리가 비어 있습니다');
  } catch (e) {
    showError(`카테고리 목록 로드 실패: ${e.message}`);
    setRefreshing(false);
    return;
  }

  const results = await Promise.allSettled(
    categories.map(async ({ name, gid }) => {
      const res = await fetch(csvUrl(name, gid));
      if (!res.ok) throw new Error(`${name} 시트 로드 실패 (${res.status})`);
      const text = await res.text();
      const rows = parseCSV(text);
      return rows.map(cols => ({
        ko:  cols[0] || '',
        en:  cols[1] || '',
        def: cols[2] || '',
        ex:  cols[3] || '',
        cat: name,
      })).filter(t => t.ko);
    })
  );

  const errors = [];
  results.forEach((r, i) => {
    if (r.status === 'fulfilled') allTerms.push(...r.value);
    else errors.push(`${categories[i].name}: ${r.reason.message}`);
  });

  if (errors.length) showError('일부 시트를 불러오지 못했습니다: ' + errors.join(' / '));

  const validCats = ['전체', ...categories.map(c => c.name)];
  if (!validCats.includes(activeCat)) activeCat = '전체';

  buildSidebar(categories.map(c => c.name));
  render();
  setRefreshing(false);
}

// ── 사이드바 ──────────────────────────────────────────────────
function buildSidebar(sheets) {
  const list = document.getElementById('cat-list');
  document.getElementById('count-all').textContent = allTerms.length;

  // 기존 항목(전체 제외) 모두 제거 후 재생성
  [...list.querySelectorAll('[data-cat]:not([data-cat="전체"])')].forEach(el => el.remove());

  sheets.forEach(sheet => {
    const cnt = allTerms.filter(t => t.cat === sheet).length;
    if (cnt === 0) return;
    const li = document.createElement('li');
    li.className = 'cat-item' + (activeCat === sheet ? ' active' : '');
    li.dataset.cat = sheet;
    li.innerHTML = `${sheet} <span class="count">${cnt}</span>`;
    li.addEventListener('click', () => setCat(sheet));
    list.appendChild(li);
  });
}

function setCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-item').forEach(el => {
    el.classList.toggle('active', el.dataset.cat === cat);
  });
  render();
}

// ── 렌더 ──────────────────────────────────────────────────────
function filtered() {
  const q = query.toLowerCase();
  return allTerms.filter(t => {
    const matchCat = activeCat === '전체' || t.cat === activeCat;
    const matchQ = !q || [t.ko, t.en, t.def, t.ex].some(s => s.toLowerCase().includes(q));
    return matchCat && matchQ;
  });
}

function hl(text) {
  if (!query) return escHtml(text);
  const re = new RegExp(`(${escRe(query)})`, 'gi');
  return escHtml(text).replace(re, '<mark>$1</mark>');
}
const escHtml = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const escRe   = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

function render() {
  const items = filtered();
  const title = activeCat === '전체' ? '전체 용어' : activeCat;
  document.getElementById('content-title').textContent = title;
  document.getElementById('content-meta').textContent = `${items.length}개`;

  const list = document.getElementById('term-list');
  if (!items.length) {
    list.innerHTML = `<div class="state-box"><span class="icon">🔍</span>검색 결과가 없습니다</div>`;
    return;
  }

  list.innerHTML = items.map((t, i) => `
    <div class="term-card" id="tc-${i}">
      <div class="term-header" onclick="toggle(${i})">
        <span class="term-ko">${hl(t.ko)}</span>
        ${t.en ? `<span class="term-en">${hl(t.en)}</span>` : ''}
        <svg class="term-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="term-body">
        ${t.def ? `<p class="term-def">${hl(t.def)}</p>` : ''}
        ${t.ex  ? `<div class="term-ex"><span class="term-ex-label">사용 예시</span>${hl(t.ex)}</div>` : ''}
      </div>
    </div>
  `).join('');

  // 검색 중이면 전부 펼치기
  if (query) {
    items.forEach((_, i) => document.getElementById(`tc-${i}`)?.classList.add('open'));
  }
}

function toggle(i) {
  document.getElementById(`tc-${i}`)?.classList.toggle('open');
}

// ── 검색 ──────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  query = e.target.value.trim();
  render();
});

// ── 새로고침 버튼 ─────────────────────────────────────────────
document.getElementById('btn-refresh').addEventListener('click', loadAll);

function setRefreshing(on) {
  const icon  = document.getElementById('refresh-icon');
  const label = document.getElementById('refresh-label');
  icon.classList.toggle('spin', on);
  label.textContent = on ? '로딩 중…' : '새로고침';
  document.getElementById('btn-refresh').disabled = on;
}

// ── 에러 표시 ─────────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = '⚠ ' + msg;
  el.classList.add('show');
}
function hideError() {
  document.getElementById('error-banner').classList.remove('show');
}

// ── 사이드바 이벤트: 전체 ─────────────────────────────────────
document.querySelector('[data-cat="전체"]').addEventListener('click', () => setCat('전체'));

// ── 시작 ──────────────────────────────────────────────────────
loadAll();
</script>
</body>
</html>
